---
#
# Pull request validation: unit tests, integration tests, E2E tests,
# code style, Go quality, and OpenAPI breaking change detection.
#
name: Pull Request

on:
  pull_request:
    types: [opened, synchronize, reopened]

# Define reusable environment variables
env:
  GRADLE_OPTS: "-Dorg.gradle.daemon=false -Dorg.gradle.parallel=true"

permissions:
  contents: read
  checks: write
  pull-requests: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  buildandtest:
    name: Build and Test
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Build and test
        run: ./gradlew shadowJar test integrationTest

      - name: Publish test results
        uses: EnricoMi/publish-unit-test-result-action@v2
        if: always()
        with:
          files: '**/build/test-results/**/*.xml'

      - name: Upload build artifacts
        uses: actions/upload-artifact@v7
        if: failure()
        with:
          name: build-logs
          path: '**/build/reports/'
  e2e:
    name: End to End Tests
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Build Docker image
        run: ./gradlew shadowJar buildDockerServer tagLocalDockerServer
        env:
          GO_MODULES_TOKEN: ${{ secrets.GO_MODULES_TOKEN }}

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.26.2'

      - name: Configure Git for private Go modules
        run: |
          git config --global url."https://x-access-token:${{ secrets.GO_MODULES_TOKEN }}@github.com/".insteadOf "https://github.com/"

      - name: Configure Go for private modules
        run: |
          go env -w GOPRIVATE=github.com/datadatdat/*
          go env -w GONOPROXY=github.com/datadatdat/*
          go env -w GONOSUMDB=github.com/datadatdat/*

      - name: End to End tests
        run: |
          uname -a
          echo "Kernel version: $(uname -r)"
          echo "Checking for ZFS module compatibility..."
          apt-cache search "linux-modules-$(uname -r)" || echo "No exact kernel modules found"
          apt-cache search "linux-modules-extra-$(uname -r)" || echo "No extra kernel modules found"
          go test -p 1 -v ./test/docker ./test/remote
        env:
          S3_LOCATION: ${{ secrets.S3_TEST_LOCATION }}
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_REGION: ${{ secrets.AWS_REGION }}

  style:
    name: Code Style
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Cache Gradle dependencies
        uses: actions/cache@v5
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*') }}
          restore-keys: |
            gradle-${{ runner.os }}-

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Check style
        run: ./gradlew style

      - name: Upload style reports
        uses: actions/upload-artifact@v7
        if: failure()
        with:
          name: style-reports
          path: '**/build/reports/ktlint/'

  # OpenAPI spec breaking change detection
  openapi-check:
    name: OpenAPI Breaking Changes
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout PR
        uses: actions/checkout@v6

      - name: Checkout base branch spec
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.base.sha }}
          path: base

      - name: Install oasdiff
        run: |
          OASDIFF_VERSION=$(curl -sSL -o /dev/null -w '%{url_effective}' https://github.com/Tufin/oasdiff/releases/latest | xargs basename)
          curl -sSL "https://github.com/Tufin/oasdiff/releases/download/${OASDIFF_VERSION}/oasdiff_${OASDIFF_VERSION#v}_linux_amd64.tar.gz" | tar xz
          sudo mv oasdiff /usr/local/bin/

      - name: Check for breaking changes
        run: |
          echo "## OpenAPI Spec Changes" >> $GITHUB_STEP_SUMMARY

          # Check for breaking changes
          if oasdiff breaking base/openapi/datadatdat.yml openapi/datadatdat.yml; then
            echo "No breaking changes detected." >> $GITHUB_STEP_SUMMARY
          else
            echo "**Breaking changes detected** — verify datadatdat-client-go compatibility." >> $GITHUB_STEP_SUMMARY
            exit 1
          fi

          # Show diff summary
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Changelog" >> $GITHUB_STEP_SUMMARY
          oasdiff changelog base/openapi/datadatdat.yml openapi/datadatdat.yml >> $GITHUB_STEP_SUMMARY 2>&1 || true

  # Go code quality checks
  go-quality:
    name: Go Code Quality
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Configure Git for private modules
        run: |
          git config --global url."https://x-access-token:${{ secrets.GO_MODULES_TOKEN }}@github.com/".insteadOf "https://github.com/"
          git config --global credential.helper store
          echo "https://x-access-token:${{ secrets.GO_MODULES_TOKEN }}@github.com" > ~/.git-credentials
        shell: bash

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.26.2'
          cache: true

      - name: Configure Go for private modules
        run: |
          go env -w GOPRIVATE=github.com/datadatdat/*
          go env -w GONOPROXY=github.com/datadatdat/*
          go env -w GONOSUMDB=github.com/datadatdat/*
          go env -w GOPROXY=direct
        shell: bash
        env:
          GOPRIVATE: github.com/datadatdat/*
          GONOPROXY: github.com/datadatdat/*
          GONOSUMDB: github.com/datadatdat/*

      - name: Cache Go modules
        uses: actions/cache@v5
        with:
          path: |
            ~/go/pkg/mod
            ~/.cache/go-build
          key: go-${{ runner.os }}-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            go-${{ runner.os }}-

      - name: Download Go dependencies
        run: go mod download
        env:
          GOPRIVATE: github.com/datadatdat/*
          GONOPROXY: github.com/datadatdat/*
          GONOSUMDB: github.com/datadatdat/*
          GIT_TERMINAL_PROMPT: 0

      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: latest
          working-directory: .
          args: --config .golangci.yml --timeout 5m

      - name: Check Go formatting
        run: |
          if [ "$(gofmt -s -l . | wc -l)" -gt 0 ]; then
            echo "Go code is not formatted:"
            gofmt -s -l .
            exit 1
          fi

      - name: Run go vet
        run: go vet ./...
        env:
          GOPRIVATE: github.com/datadatdat/*
          GONOPROXY: github.com/datadatdat/*
          GONOSUMDB: github.com/datadatdat/*
          GIT_TERMINAL_PROMPT: 0

      - name: Run Go security scanner (gosec)
        run: |
          go install github.com/securego/gosec/v2/cmd/gosec@latest
          gosec ./...
        env:
          GOPRIVATE: github.com/datadatdat/*
          GONOPROXY: github.com/datadatdat/*
          GONOSUMDB: github.com/datadatdat/*
          GIT_TERMINAL_PROMPT: 0

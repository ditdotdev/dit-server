---
#
# We only build the java artifacts during pull request, because building the
# full docker image takes much longer. That is only run after code has been
# merged or as part of a release.
#
name: Pull Request

on:
  pull_request:
    types: [opened, synchronize, reopened]

# Define reusable environment variables
env:
  GRADLE_OPTS: "-Dorg.gradle.daemon=false -Dorg.gradle.parallel=true"

permissions:
  contents: read
  checks: write
  pull-requests: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  buildandtest:
    name: Build and Test
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v5

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Build and test
        run: ./gradlew shadowJar test integrationTest

      - name: Publish test results
        uses: EnricoMi/publish-unit-test-result-action@v2
        if: always()
        with:
          files: build/test-results/**/*.xml

      - name: Upload build artifacts
        uses: actions/upload-artifact@v6
        if: failure()
        with:
          name: build-logs
          path: build/reports/
  style:
    name: Code Style
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Cache Gradle dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*') }}
          restore-keys: |
            gradle-${{ runner.os }}-

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Check style
        run: ./gradlew style

      - name: Upload style reports
        uses: actions/upload-artifact@v6
        if: failure()
        with:
          name: style-reports
          path: build/reports/ktlint/

  # Go code quality checks
  go-quality:
    name: Go Code Quality
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure Git for private modules
        run: |
          git config --global url."https://x-access-token:${{ secrets.GO_MODULES_TOKEN }}@github.com/".insteadOf "https://github.com/"
          git config --global credential.helper store
          echo "https://x-access-token:${{ secrets.GO_MODULES_TOKEN }}@github.com" > ~/.git-credentials
        shell: bash

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25.1'
          cache: true

      - name: Configure Go for private modules
        run: |
          go env -w GOPRIVATE=github.com/datadatdat/*
          go env -w GONOPROXY=github.com/datadatdat/*
          go env -w GONOSUMDB=github.com/datadatdat/*
          go env -w GOPROXY=direct
        shell: bash
        env:
          GOPRIVATE: github.com/datadatdat/*
          GONOPROXY: github.com/datadatdat/*
          GONOSUMDB: github.com/datadatdat/*

      - name: Cache Go modules
        uses: actions/cache@v4
        with:
          path: |
            ~/go/pkg/mod
            ~/.cache/go-build
          key: go-${{ runner.os }}-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            go-${{ runner.os }}-

      - name: Download Go dependencies
        run: go mod download
        env:
          GOPRIVATE: github.com/datadatdat/*
          GONOPROXY: github.com/datadatdat/*
          GONOSUMDB: github.com/datadatdat/*
          GIT_TERMINAL_PROMPT: 0

      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v7
        with:
          version: latest
          working-directory: .
          args: --config .golangci.yml --timeout 5m

      - name: Check Go formatting
        run: |
          if [ "$(gofmt -s -l . | wc -l)" -gt 0 ]; then
            echo "Go code is not formatted:"
            gofmt -s -l .
            exit 1
          fi

      - name: Run go vet
        run: go vet ./...
        env:
          GOPRIVATE: github.com/datadatdat/*
          GONOPROXY: github.com/datadatdat/*
          GONOSUMDB: github.com/datadatdat/*
          GIT_TERMINAL_PROMPT: 0

#
# On release, we perform the same actions as the push handler, but with a
# specific tagged version. We then:
#
#   * Publish the docker image to the GitHub docker package registry
#   * Publish the client jar to the GitHub
#   * Publish a draft GitHub release
#
name: Release

on: create

jobs:
  publish:
    name: Test and publish
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'temurin'
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6
      - name: Build and test
        run: ./gradlew build buildDockerServer tagDockerServer tagLocalDockerServer -PserverImageName=ditdotdev/dit -PditVersion=${GITHUB_REF#refs/tags/}
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_REGION: ${{ secrets.AWS_REGION }}
          GO_MODULES_TOKEN: ${{ secrets.GO_MODULES_TOKEN }}
      - uses: actions/setup-go@v7
        with:
          go-version: '1.26.2'
      - name: Configure Git for private Go modules
        run: |
          git config --global url."https://x-access-token:${{ secrets.GO_MODULES_TOKEN }}@github.com/".insteadOf "https://github.com/"
      - name: Configure Go for private modules
        run: |
          go env -w GOPRIVATE=github.com/ditdotdev/*
          go env -w GONOPROXY=github.com/ditdotdev/*
          go env -w GONOSUMDB=github.com/ditdotdev/*
      - name: End to End tests
        run: |
          uname -a
          echo "Kernel version: $(uname -r)"
          echo "Checking for ZFS module compatibility..."
          apt-cache search "linux-modules-$(uname -r)" || echo "No exact kernel modules found"
          apt-cache search "linux-modules-extra-$(uname -r)" || echo "No extra kernel modules found"
          go test -p 1 -v ./test/docker ./test/remote
        env:
          # Per-run S3 prefix isolates concurrent CI runs so their suites do
          # not clobber each other's commits. See issue #156.
          S3_LOCATION: ${{ secrets.S3_TEST_LOCATION }}/run-${{ github.run_id }}-${{ github.run_attempt }}
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_REGION: ${{ secrets.AWS_REGION }}
      
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
      #
      # GITHUB_TOKEN cannot currently be used for pushing docker images, so we
      # have to use a hard-coded secret instead.
      #
      - name: Publish docker image
        run: |
          docker login -u ${{ secrets.DOCKER_USER }} -p ${{ secrets.DOCKER_PASSWORD }}
          # publishDockerServer builds and pushes multi-arch images (amd64, arm64) with the version tag
          ./gradlew publishDockerServer -PserverImageName=ditdotdev/dit -PditVersion=${GITHUB_REF#refs/tags/}
          # Create :latest tag pointing to the versioned multi-arch manifest
          docker buildx imagetools create \
            --tag ditdotdev/dit:latest \
            ditdotdev/dit:${GITHUB_REF#refs/tags/}
        env:
          GO_MODULES_TOKEN: ${{ secrets.GO_MODULES_TOKEN }}

#
# On release, we perform the same actions as the push handler, but with a
# specific tagged version. We then:
#
#   * Publish the docker image to the GitHub docker package registry
#   * Publish the client jar to the GitHub
#   * Publish a draft GitHub release
#
name: Release

on: create

jobs:
  publish:
    name: Test and publish
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v5
      - name: Build and test
        run: ./gradlew build -PserverImageName=datadatdat/datadatdat -PdatadatdatVersion=${GITHUB_REF#refs/tags/}
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_REGION: ${{ secrets.AWS_REGION }}
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25.1'
      - name: Configure Git for private modules
        run: git config --global url."https://${{ secrets.GO_MODULES_TOKEN }}@github.com/".insteadOf "https://github.com/"
        env:
          GO_MODULES_TOKEN: ${{ secrets.GO_MODULES_TOKEN }}
      - name: End to End tests
        run: |
          uname -a
          echo "Kernel version: $(uname -r)"
          echo "Checking for ZFS module compatibility..."
          # Try to find available kernel modules that match the current kernel
          apt-cache search "linux-modules-$(uname -r)" || echo "No exact kernel modules found"
          apt-cache search "linux-modules-extra-$(uname -r)" || echo "No extra kernel modules found"
          go test -p 1 -v ./test/docker ./test/remote
        env:
          S3_LOCATION: ${{ secrets.S3_TEST_LOCATION }}
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_REGION: ${{ secrets.AWS_REGION }}
          SKIP_ZFS_E2E_ON_FAILURE: "true"
          GOPRIVATE: github.com/datadatdat/*
      
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      #
      # GITHUB_TOKEN cannot currently be used for pushing docker images, so we
      # have to use a hard-coded secret instead.
      #
      - name: Publish docker image
        run: |
          docker login -u ${{ secrets.DOCKER_USER }} -p ${{ secrets.DOCKER_PASSWORD }}
          # publishDockerServer builds and pushes multi-arch images (amd64, arm64) with the version tag
          ./gradlew publishDockerServer -PserverImageName=datadatdat/datadatdat -PdatadatdatVersion=${GITHUB_REF#refs/tags/}
          # Create :latest tag pointing to the versioned multi-arch manifest
          docker buildx imagetools create \
            --tag datadatdat/datadatdat:latest \
            datadatdat/datadatdat:${GITHUB_REF#refs/tags/}

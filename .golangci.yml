# golangci-lint configuration for dit-server
# Configuration compatible with golangci-lint v2.5.0
version: "2"

run:
  timeout: 5m
  modules-download-mode: readonly

linters:
  enable:
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused
    - gosec
    - misspell
    - gocyclo
    - goconst
    - whitespace
  exclusions:
    rules:
      # Test files routinely repeat fixture strings ("ssh", "origin",
      # "path", "a=b" etc.) for readability. Forcing them into shared
      # constants makes tests harder to read in isolation and couples
      # otherwise unrelated cases. Skip goconst there.
      - path: _test\.go
        linters:
          - goconst